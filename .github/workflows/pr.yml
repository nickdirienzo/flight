name: PR

on:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  swift:
    name: Swift build and test
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Show Swift version
        run: swift --version

      - name: Build app
        run: swift build --target Flight

      - name: Build benchmarks
        run: swift build --target FlightBench

      - name: Run tests
        run: swift test

      - name: Run benchmarks
        run: swift run -c release FlightBench

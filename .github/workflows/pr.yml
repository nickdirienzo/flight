name: PR

on:
  pull_request:
  workflow_dispatch:

jobs:
  swift:
    name: Swift build and test
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build app
        run: swift build --target Flight

      - name: Build benchmarks
        run: swift build --target FlightBench

      - name: Run tests
        run: swift test

      - name: Run benchmarks
        run: swift run -c release FlightBench
